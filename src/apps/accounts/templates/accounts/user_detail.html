{% extends "base.html" %}
{% block title %}{{ profile_identity.display_name }} | 사용자{% endblock %}
{% block content %}
<h1>{{ profile_identity.display_name }}</h1>
<section aria-label="사용자 소개">
  {% if profile_bio %}<p>{{ profile_bio }}</p>{% else %}<p>등록된 소개글이 없습니다.</p>{% endif %}
</section>
{% if show_report %}
  <p><a href="{% url 'moderation:report-user' profile_user.pk %}">사용자 신고</a></p>
{% endif %}
{% endblock %}
