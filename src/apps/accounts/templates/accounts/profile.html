{% extends "base.html" %}
{% block title %}마이페이지{% endblock %}
{% block content %}
<h1>마이페이지</h1>
<dl>
  <dt>아이디</dt><dd>{{ request.user.username }}</dd>
  <dt>소개글</dt><dd>{{ request.user.bio|default:"등록된 소개글이 없습니다." }}</dd>
</dl>
<p><a href="{% url 'accounts:bio_edit' %}">소개글 변경</a></p>
<p><a href="{% url 'accounts:password_change' %}">비밀번호 변경</a></p>
{% endblock %}
