{% extends "base.html" %}
{% block title %}로그인{% endblock %}
{% block content %}
<h1>로그인</h1>
{% if login_error %}<p class="error" role="alert">{{ login_error }}</p>{% endif %}
<form method="post" novalidate>
  {% csrf_token %}
  {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
  <p><label for="id_username">아이디</label><input id="id_username" name="username" autocomplete="username" maxlength="128" required></p>
  <p><label for="id_password">비밀번호</label><input id="id_password" type="password" name="password" autocomplete="current-password" maxlength="128" required></p>
  <button type="submit">로그인</button>
</form>
{% endblock %}
