{% load static %}
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}안전한 중고거래{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'site.css' %}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{% url 'home' %}">안전한 중고거래</a>
    <nav aria-label="주요 메뉴">
      <a href="{% url 'accounts:user_list' %}">사용자</a>
      <a href="{% url 'catalog:list' %}">상품</a>
      {% if request.user.is_authenticated %}
        <a href="{% url 'accounts:profile' %}">마이페이지</a>
        <a href="{% url 'chat:room-list' %}">채팅</a>
        <form class="inline" method="post" action="{% url 'accounts:logout' %}">
          {% csrf_token %}
          <button type="submit">로그아웃</button>
        </form>
      {% else %}
        <a href="{% url 'accounts:login' %}">로그인</a>
        <a href="{% url 'accounts:signup' %}">회원가입</a>
      {% endif %}
    </nav>
  </header>
  <main>
    {% for message in messages %}<p class="notice">{{ message }}</p>{% endfor %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
