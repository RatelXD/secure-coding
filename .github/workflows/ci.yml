name: ci

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12.13'
  NODE_VERSION: '22.23.0'
  UV_VERSION: '0.11.29'

jobs:
  governance-title:
    name: governance-title
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Resolve and enforce immutable Korean title
        shell: python
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          import os
          import runpy
          import subprocess

          head = os.environ['HEAD_SHA']
          subject = subprocess.run(
              ['git', 'show', '-s', '--format=%s', head],
              check=True,
              capture_output=True,
              text=True,
          ).stdout.rstrip('\n')
          count = int(subprocess.run(
              ['git', 'rev-list', '--count', f"{os.environ['BASE_SHA']}..{head}"],
              check=True,
              capture_output=True,
              text=True,
          ).stdout)
          validator = runpy.run_path(
              'scripts/verify_pr_title.py',
              run_name='verify_pr_title',
          )
          errors = validator['validate_pr'](
              os.environ['PR_TITLE'],
              subject,
              count,
          )
          if errors:
              raise SystemExit('\n'.join(errors))
      - name: Verify governance and pinned toolchain contracts
        run: |
          python .github/verify_toolchain.py --static
          python -m unittest discover -s tests/governance -v
      - name: Success receipt
        run: echo 'CI receipt governance-title=PASS (title and governance executed)'

  python-checks:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: unit
            patterns: 'src/**;tests/unit/**;pyproject.toml;uv.lock;Dockerfile;.github/workflows/ci.yml;.github/toolchain.json'
            command: 'uv run pytest -q tests/unit'
          - name: integration-postgres-redis
            patterns: 'src/**;tests/integration/**;compose.yaml;compose.test.yaml;pyproject.toml;uv.lock;Dockerfile;.github/workflows/ci.yml;.github/toolchain.json'
            command: 'uv run pytest -q tests/integration'
          - name: security
            patterns: 'src/**;tests/security/**;compose.yaml;compose.test.yaml;pyproject.toml;uv.lock;Dockerfile;.github/**'
            command: 'uv run pytest -q tests/security'
          - name: migration
            patterns: 'src/**/models.py;src/**/migrations/**;src/config/**;pyproject.toml;uv.lock;compose.yaml;compose.test.yaml;Dockerfile;.github/workflows/ci.yml;.github/toolchain.json'
            command: 'uv run python src/manage.py makemigrations --check --dry-run && uv run python src/manage.py migrate --noinput'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Detect relevant paths
        id: changes
        shell: python
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          PATTERNS: ${{ matrix.patterns }}
        run: |
          import fnmatch
          import os
          import subprocess

          base = os.environ.get('BASE_SHA', '')
          if not base or base == '0' * 40:
              changed = ['<initial-push>']
              relevant = True
          else:
              changed = subprocess.run(
                  ['git', 'diff', '--name-only', base, os.environ['HEAD_SHA']],
                  check=True,
                  capture_output=True,
                  text=True,
              ).stdout.splitlines()
              patterns = os.environ['PATTERNS'].split(';')
              relevant = any(
                  fnmatch.fnmatch(path, pattern)
                  for path in changed
                  for pattern in patterns
              )
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
              print(f"relevant={'true' if relevant else 'false'}", file=output)
          print(f"Relevant paths: {relevant}; changed files: {len(changed)}")
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        if: steps.changes.outputs.relevant == 'true'
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install pinned Python toolchain
        if: steps.changes.outputs.relevant == 'true'
        run: |
          python -m pip install --disable-pip-version-check "uv==${UV_VERSION}"
          uv sync --frozen --group test
      - name: Start isolated PostgreSQL and Redis
        if: steps.changes.outputs.relevant == 'true'
        run: docker compose -p "secure-coding-ci-${{ strategy.job-index }}" -f compose.yaml -f compose.test.yaml up -d --wait db redis
      - name: Execute focused check
        if: steps.changes.outputs.relevant == 'true'
        env:
          APP_ENV: test
          DJANGO_SETTINGS_MODULE: config.settings
          DJANGO_DEBUG: '1'
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,testserver
          POSTGRES_DB: marketplace
          POSTGRES_USER: marketplace
          POSTGRES_PASSWORD: development-only-database-password
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: '55432'
          POSTGRES_SSLMODE: disable
          REDIS_URL: redis://127.0.0.1:56379/0
          CHECK_COMMAND: ${{ matrix.command }}
        run: bash -euo pipefail -c "$CHECK_COMMAND"
      - name: Stop isolated services
        if: always() && steps.changes.outputs.relevant == 'true'
        run: docker compose -p "secure-coding-ci-${{ strategy.job-index }}" -f compose.yaml -f compose.test.yaml down -v
      - name: Executed success receipt
        if: steps.changes.outputs.relevant == 'true'
        run: echo 'CI receipt ${{ matrix.name }}=PASS (focused check executed)'
      - name: Path-skip success receipt
        if: steps.changes.outputs.relevant != 'true'
        run: echo 'CI receipt ${{ matrix.name }}=PASS (no relevant paths)'

  browser-a11y:
    name: browser-a11y
    runs-on: ubuntu-24.04
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble@sha256:5b8f294aff9041b7191c34a4bab3ac270157a28774d4b0660e9743297b697e48
    env:
      POSTGRES_DB: marketplace
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: development-only-database-password
      POSTGRES_HOST: db
      POSTGRES_PORT: '5432'
      POSTGRES_SSLMODE: disable
      REDIS_URL: redis://redis:6379/0
    services:
      db:
        image: postgres:17.10-alpine3.23@sha256:8189a1f6e40904781fc9e2612687877791d21679866db58b1de996b31fc312e4
        env:
          POSTGRES_DB: marketplace
          POSTGRES_USER: marketplace
          POSTGRES_PASSWORD: development-only-database-password
        options: >-
          --health-cmd "pg_isready -U marketplace -d marketplace"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7.4.9-alpine3.21@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Require browser smoke specs
        run: >-
          python -c "from pathlib import Path;
          assert any(Path('tests/e2e').glob('**/*.spec.*')),
          'browser-relevant required check needs a committed spec'"
      - name: Install and verify locked browser toolchain
        run: |
          python -m pip install --disable-pip-version-check "uv==${UV_VERSION}"
          uv sync --frozen
          npm ci --ignore-scripts
          python .github/verify_toolchain.py
      - name: Run Chromium and local axe checks
        run: npx playwright test
      - name: Executed success receipt
        run: echo 'CI receipt browser-a11y=PASS (two-viewport browser and axe checks executed)'
