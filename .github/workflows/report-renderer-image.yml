name: report-renderer-image

on:
  push:
    branches: [main]
    paths:
      - report/renderer/**
      - .github/workflows/report-renderer-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: report-renderer-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Build fixed linux/amd64 image
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/secure-coding-report-renderer
        run: |
          set -eu
          IMAGE=$(printf '%s' "$IMAGE" | tr '[:upper:]' '[:lower:]')
          docker build --pull=false --platform linux/amd64 \
            --tag "$IMAGE:$GITHUB_SHA" report/renderer
          docker run --rm --platform linux/amd64 \
            "$IMAGE:$GITHUB_SHA" /renderer/inventory.py
      - name: Publish exact commit image
        env:
          GHCR_TOKEN: ${{ github.token }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/secure-coding-report-renderer
        run: |
          set -eu
          IMAGE=$(printf '%s' "$IMAGE" | tr '[:upper:]' '[:lower:]')
          printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          docker push "$IMAGE:$GITHUB_SHA"
          docker image inspect --format '{{index .RepoDigests 0}}' "$IMAGE:$GITHUB_SHA" >> "$GITHUB_STEP_SUMMARY"
