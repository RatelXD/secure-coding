name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12.10'
      - name: Install pinned Pages builder
        run: python -m pip install --disable-pip-version-check 'mkdocs==1.6.1'
      - name: Build strict public site
        run: mkdocs build --strict
      - name: Reject private material
        run: |
          if test -e site/private-submission || test -e site/.evidence-private; then
            echo 'private path entered Pages output' >&2
            exit 1
          fi
          python - <<'PY'
          from pathlib import Path
          import re
          forbidden = re.compile(rb'/home/[A-Za-z0-9._-]+/|https://[a-z0-9-]+\.ngrok-free\.app|(?:authorization|cookie):\s*\S+|(?:LMS_(?:ID|PASSWORD)|SESSION_KEY)\s*=', re.I)
          for path in Path('site').rglob('*'):
              if path.is_file() and forbidden.search(path.read_bytes()):
                  raise SystemExit(f'private marker in {path}')
          PY
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
